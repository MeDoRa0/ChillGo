name: chillgo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

# Built-in Kotlin migration status
# ---------------------------------
# Flutter emits a KGP warning for any plugin that still calls
# `apply plugin: "kotlin-android"` in its android/build.gradle. As of the
# versions pinned below, three plugins still do:
#   - firebase_analytics (^12.4.3)
#   - firebase_storage   (^13.4.3)
#   - sign_in_with_apple (^8.1.0)
# This is a forward-compatibility warning, not a build error. The build
# succeeds on AGP 9.0.x. It will become a hard error only when a future
# Flutter version drops the legacy plugin-application path entirely.
# Track upstream migration:
#   - https://github.com/firebase/flutterfire/issues (Built-in Kotlin label)
#   - https://github.com/aboutyou/dart_packages/tree/master/packages/sign_in_with_apple
# When those plugins release versions using the declarative plugins DSL,
# bump the constraints below and the warning will go away.

dependencies:
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
  shared_preferences: ^2.2.2
  flutter_bloc: ^9.1.1
  go_router: ^17.3.0
  get_it: ^9.2.1
  flutter:
    sdk: flutter
  google_sign_in: ^7.2.0
  firebase_storage: ^13.4.3
  sign_in_with_apple: ^8.1.0
  image_picker: ^1.0.7
  image: ^4.1.3
  equatable: ^2.0.6
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
