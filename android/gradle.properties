org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# NOTE: `newDsl`/`builtInKotlin` defaults are `true` in AGP 9.0+, but the
# Flutter Gradle Plugin (1.0.0) still requires the legacy plugin-application
# path on this Flutter version. Setting these to `true` triggers a NPE inside
# dev.flutter.flutter-gradle-plugin, so we keep the template defaults until
# Flutter ships a newDsl-capable Flutter Gradle Plugin.
android.newDsl=false
android.builtInKotlin=false
